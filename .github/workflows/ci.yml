name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  # ── Windows (clang-cl + LLVM 20) ────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [default, release]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install LLVM 20
        run: |
          choco install llvm --version=22.1.0 -y
          echo "LLVMInstallDir=C:\Program Files\LLVM" >> $env:GITHUB_ENV
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Strawberry Perl
        run: choco install strawberryperl -y

      - name: Install Ninja
        run: choco install ninja -y

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Upload client artifact
        if: matrix.preset == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: parties-client-windows
          path: build-release/client/parties_client.exe

      - name: Upload server artifact
        if: matrix.preset == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: parties-server-windows
          path: build-release/server/parties_server.exe

  # ── macOS (Apple Clang, ARM64) ──────────────────────────────────────────────
  macos:
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        preset: [macos-arm64-debug, macos-arm64-release]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Ninja
        run: brew install ninja

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Upload client artifact
        if: matrix.preset == 'macos-arm64-release'
        uses: actions/upload-artifact@v4
        with:
          name: parties-client-macos
          path: build-macos-release/client/parties_client.app

  # ── Linux (server only, gcc) ────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            autoconf automake libtool

      - name: Configure
        run: cmake --preset linux-release

      - name: Build
        run: cmake --build --preset linux-release

      - name: Run integration tests
        run: |
          chmod +x build-linux/tests/parties_integration_test
          ./build-linux/tests/parties_integration_test

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: parties-server-linux
          path: build-linux/server/parties_server
